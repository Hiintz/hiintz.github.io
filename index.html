<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styleCongrat.css">
</head>

<body>
    <div class="container">
        <h1>Puzzle !</h1>
        <p class="intro-text">Assemblez les pièces du puzzle pour découvrir ta surprise !</p>

        <div class="puzzle-container" id="puzzleContainer">
            <!-- Les pièces du puzzle seront ajoutées ici par JavaScript -->
        </div>

        <div class="reveal-text" id="revealText">
            <h2>! Félicitations !</h2>
            <p>Venez découvrir votre surprise en cliquant sur le bouton ci-dessous.</p>
            <!-- on redirige vers la page congrat.html -->
            <button id="congrat" onclick="window.location.href='congrat.html'">Découvrir</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
